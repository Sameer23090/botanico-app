<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/plant-icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Botanico — Grow. Score. Thrive. Scientific plant tracking with GPS intelligence." />
  <title>Botanico — Grow. Score. Thrive.</title>
</head>

<body>
  <!-- Custom cursor: dot only, zero-lag GPU transform -->
  <div id="cursor" class="cursor"></div>
  <div id="root"></div>
  <script type="module" src="/frontend/src/main.jsx"></script>
  <script>
    // Zero-lag cursor — directly sets translate3d on every mousemove, no rAF loop
    const cur = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cur.style.transform = `translate3d(${e.clientX - 6}px, ${e.clientY - 6}px, 0)`;
    }, { passive: true });
  </script>
</body>

</html>
